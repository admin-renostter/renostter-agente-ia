# Railway configuration for Waha service
# This service runs the Waha Core container for WhatsApp integration

[build]
  builder = "DOCKERFILE"
  dockerfilePath = "infra/waha.Dockerfile"

[deploy]
  # Waha default port
  startCommand = "node /usr/src/app/packages/waha/src/waha.js"
  healthcheckPath = "/ping"
  healthcheckTimeout = 300
  restartPolicyType = "ON_FAILURE"
  restartPolicyMaxRetries = 3

# Environment variables (set in Railway dashboard)
# WAHA_BASE_URL=http://waha.railway.internal:8080
# WAHA_HOOK_EVENTS=message,session.status
# WAHA_API_KEY=  (optional)
