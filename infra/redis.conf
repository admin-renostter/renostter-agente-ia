# Redis configuration for Railway
# This config is used when running Redis as a service

# Listen on all interfaces (Railway networking)
bind 0.0.0.0

# Port (default 6379)
port 6379

# Memory management
maxmemory 256mb
maxmemory-policy allkeys-lru

# Persistence (optional for caching)
save 900 1
save 300 10
save 60 10000

# Logging
loglevel notice

# Disable protected mode (Railway private networking)
protected-mode no
